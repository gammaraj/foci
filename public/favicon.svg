<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Outer lens ring -->
  <circle cx="16" cy="16" r="11" stroke="white" stroke-width="2" stroke-opacity="0.25" fill="none"/>
  <!-- Inner lens ring -->
  <circle cx="16" cy="16" r="7" stroke="white" stroke-width="1.5" stroke-opacity="0.5" fill="none"/>
  <!-- Focal point -->
  <circle cx="16" cy="16" r="3" fill="white"/>
  <!-- Crosshair accents -->
  <line x1="16" y1="2" x2="16" y2="6" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.4"/>
  <line x1="16" y1="26" x2="16" y2="30" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.4"/>
  <line x1="2" y1="16" x2="6" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.4"/>
  <line x1="26" y1="16" x2="30" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.4"/>
</svg>
