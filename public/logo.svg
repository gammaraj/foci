<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Outer lens ring -->
  <circle cx="256" cy="256" r="176" stroke="white" stroke-width="24" stroke-opacity="0.25" fill="none"/>
  <!-- Inner lens ring -->
  <circle cx="256" cy="256" r="112" stroke="white" stroke-width="18" stroke-opacity="0.5" fill="none"/>
  <!-- Focal point -->
  <circle cx="256" cy="256" r="48" fill="white"/>
  <!-- Crosshair accents -->
  <line x1="256" y1="32" x2="256" y2="96" stroke="white" stroke-width="20" stroke-linecap="round" stroke-opacity="0.4"/>
  <line x1="256" y1="416" x2="256" y2="480" stroke="white" stroke-width="20" stroke-linecap="round" stroke-opacity="0.4"/>
  <line x1="32" y1="256" x2="96" y2="256" stroke="white" stroke-width="20" stroke-linecap="round" stroke-opacity="0.4"/>
  <line x1="416" y1="256" x2="480" y2="256" stroke="white" stroke-width="20" stroke-linecap="round" stroke-opacity="0.4"/>
</svg>
